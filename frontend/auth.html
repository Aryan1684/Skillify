<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skillify – Login / Register</title>
    <link rel="stylesheet" href="styles/main.css" />
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1.5rem;
        }

        .auth-wrapper {
            width: 100%;
            max-width: 440px;
            animation: scaleIn 0.4s ease;
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 2rem;
            font-family: 'Outfit', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            background: var(--grad-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .auth-logo span {
            font-size: 1.4rem;
        }

        .auth-card {
            background: rgba(13, 13, 26, 0.9);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 2.5rem;
            backdrop-filter: blur(30px);
            box-shadow: var(--shadow-glow);
        }

        /* Tabs */
        .auth-tabs {
            display: flex;
            background: rgba(255, 255, 255, 0.04);
            border-radius: var(--radius-md);
            padding: 0.25rem;
            margin-bottom: 2rem;
        }

        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 0.65rem;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            color: var(--text-muted);
            transition: var(--transition);
        }

        .auth-tab.active {
            background: var(--violet);
            color: #fff;
            box-shadow: 0 2px 12px rgba(124, 58, 237, 0.4);
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 1.1rem;
        }

        .auth-form .hidden {
            display: none !important;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.8rem;
        }

        .google-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 0.75rem;
            color: var(--text-primary);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            width: 100%;
        }

        .google-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--border-active);
        }

        .google-icon {
            font-size: 1.1rem;
        }

        .demo-notice {
            background: rgba(124, 58, 237, 0.08);
            border: 1px solid rgba(124, 58, 237, 0.25);
            border-radius: var(--radius-md);
            padding: 0.75rem 1rem;
            font-size: 0.8rem;
            color: #a78bfa;
            text-align: center;
            line-height: 1.5;
        }

        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--violet-light);
            font-weight: 600;
        }

        .back-home {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-home a {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .back-home a:hover {
            color: var(--text-primary);
        }

        #loadingOverlay {
            position: fixed;
            inset: 0;
            background: rgba(8, 8, 15, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            backdrop-filter: blur(10px);
        }

        .loading-box {
            text-align: center;
        }

        .loading-box p {
            margin-top: 1rem;
            color: var(--text-secondary);
        }
    </style>
</head>

<body>

    <!-- Loading overlay -->
    <div id="loadingOverlay" class="hidden">
        <div class="loading-box">
            <div class="loader"></div>
            <p id="loadingMsg">Signing you in...</p>
        </div>
    </div>

    <div class="auth-wrapper">
        <div class="auth-logo">✦ Skillify <span>🚀</span></div>

        <div class="auth-card">
            <!-- Tabs -->
            <div class="auth-tabs">
                <div class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Login</div>
                <div class="auth-tab" id="tabRegister" onclick="switchTab('register')">Register</div>
            </div>

            <!-- Demo notice -->
            <div class="demo-notice" id="demoNotice">
                🔵 <strong>Demo Mode</strong> – Running with local storage.
                <a href="js/firebase-config.js" style="color:#c4b5fd">Add Firebase</a> for real auth.
            </div>

            <!-- Form -->
            <form class="auth-form mt-3" id="authForm" onsubmit="handleSubmit(event)">
                <!-- Register-only fields -->
                <div class="form-row" id="nameRow">
                    <div class="form-group">
                        <label class="form-label">First Name</label>
                        <input type="text" class="form-input" id="firstName" placeholder="Arjun" />
                    </div>
                    <div class="form-group">
                        <label class="form-label">Last Name</label>
                        <input type="text" class="form-input" id="lastName" placeholder="Sharma" />
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-input" id="email" placeholder="you@example.com" required />
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" id="password" placeholder="Min 6 characters" required />
                </div>

                <div class="form-group hidden" id="confirmRow">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" class="form-input" id="confirmPassword" placeholder="Re-enter password" />
                </div>

                <button type="submit" class="btn btn-primary btn-full" id="submitBtn">
                    Login to Skillify
                </button>

                <div class="divider">or continue with</div>

                <button type="button" class="google-btn" onclick="handleGoogle()">
                    <span class="google-icon">🌐</span> Continue with Google
                </button>
            </form>

            <div class="auth-footer">
                <span id="switchText">Don't have an account? </span>
                <a href="#" onclick="switchTab(currentTab==='login'?'register':'login');" id="switchLink">Register
                    here</a>
            </div>
        </div>

        <div class="back-home">
            <a href="index.html">← Back to Home</a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        let currentTab = 'login';

        // Check URL param
        const urlMode = new URLSearchParams(window.location.search).get('mode');
        if (urlMode === 'register') switchTab('register');

        // Hide demo notice if Firebase is configured
        if (!IS_DEMO) document.getElementById('demoNotice').style.display = 'none';

        // If already logged in, redirect to dashboard
        const existingUser = Auth.getCurrentUser();
        if (existingUser) {
            checkOnboardingAndRedirect(existingUser);
        }

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
            document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
            document.getElementById('nameRow').style.display = tab === 'register' ? 'grid' : 'none';
            document.getElementById('confirmRow').style.display = tab === 'register' ? 'block' : 'none';
            document.getElementById('submitBtn').textContent = tab === 'login' ? 'Login to Skillify' : 'Create Account';
            document.getElementById('switchText').textContent = tab === 'login' ? "Don't have an account? " : "Already have an account? ";
            document.getElementById('switchLink').textContent = tab === 'login' ? 'Register here' : 'Login';
        }

        async function handleSubmit(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            showLoading(currentTab === 'login' ? 'Signing you in...' : 'Creating your account...');

            try {
                let user;
                if (currentTab === 'login') {
                    user = await Auth.login(email, password);
                } else {
                    const confirmPwd = document.getElementById('confirmPassword').value;
                    if (password !== confirmPwd) { hideLoading(); Toast.error('Passwords do not match.'); return; }
                    if (password.length < 6) { hideLoading(); Toast.error('Password must be at least 6 characters.'); return; }
                    const firstName = document.getElementById('firstName').value.trim();
                    const lastName = document.getElementById('lastName').value.trim();
                    const name = `${firstName} ${lastName}`.trim() || email.split('@')[0];
                    user = await Auth.register(email, password, name);
                }
                await checkOnboardingAndRedirect(user);
            } catch (err) {
                hideLoading();
                Toast.error(err.message || 'Authentication failed. Try again.');
            }
        }

        async function handleGoogle() {
            showLoading('Connecting with Google...');
            try {
                const user = await Auth.googleLogin();
                await checkOnboardingAndRedirect(user);
            } catch (err) {
                hideLoading();
                Toast.error(err.message || 'Google sign-in failed.');
            }
        }

        async function checkOnboardingAndRedirect(user) {
            const profile = await Profile.get(user.uid) || Profile.getLocal(user.uid);
            if (!profile || !profile.onboarded) {
                window.location.href = 'onboarding.html';
            } else {
                window.location.href = 'dashboard.html';
            }
        }

        function showLoading(msg) {
            document.getElementById('loadingMsg').textContent = msg;
            document.getElementById('loadingOverlay').classList.remove('hidden');
        }
        function hideLoading() {
            document.getElementById('loadingOverlay').classList.add('hidden');
        }
    </script>
</body>

</html>
